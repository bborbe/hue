apiVersion: apps/v1
kind: Deployment
metadata:
  name: hue
  namespace: '{{ "NAMESPACE" | env }}'
  annotations:
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/match-tag: "true"
    keel.sh/pollSchedule: "@every 1m"
    random: '{{ "RANDOM" | env }}'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hue
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        prometheus.io/path: /metrics
        prometheus.io/port: "9090"
        prometheus.io/scheme: http
        prometheus.io/scrape: "true"
        random: '{{ "RANDOM" | env }}'
      labels:
        app: hue
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node_type
                    operator: In
                    values:
                      - 'agent'
      containers:
        - name: service
          args:
            - -v={{"LOGLEVEL" | env}}
          # BUILD_GIT_VERSION / BUILD_GIT_COMMIT / BUILD_DATE are intentionally
          # NOT listed below — the Dockerfile bakes them into the image's
          # runtime ENV at build time (ARG → ENV in the alpine stage), so the
          # container process inherits them automatically. Matches the
          # recurring-task-creator deploy pattern.
          env:
            - name: LISTEN
              value: ':9090'
            # SUMMER_MODE toggles the aquarium light schedule between the
            # standard daytime window (10:00-20:00, default) and the
            # evening-only window (20:00-23:00, set to "true" for heat waves).
            - name: SUMMER_MODE
              value: "false"
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  key: sentry-dsn
                  name: hue
            - name: URL
              valueFrom:
                secretKeyRef:
                  name: hue
                  key: url
            - name: ID
              valueFrom:
                secretKeyRef:
                  name: hue
                  key: id
            - name: TOKEN
              valueFrom:
                secretKeyRef:
                  name: hue
                  key: token
          image: '{{"DOCKER_REGISTRY" | env}}/hue:{{"BRANCH" | env}}'
          imagePullPolicy: Always
          livenessProbe:
            failureThreshold: 5
            httpGet:
              path: /healthz
              port: 9090
              scheme: HTTP
            initialDelaySeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          ports:
            - containerPort: 9090
              name: http
          readinessProbe:
            httpGet:
              path: /readiness
              port: 9090
              scheme: HTTP
            initialDelaySeconds: 5
            timeoutSeconds: 5
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 20m
              memory: 100Mi
